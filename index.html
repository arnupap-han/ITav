<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT & AV Asset Management 3D</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts Dependencies -->
    <script src="https://unpkg.com/react-is/umd/react-is.development.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>
    <!-- SheetJS (Excel) -->
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; }
        
        /* 3D Elements Styles */
        .card-3d {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            box-shadow: 
                20px 20px 40px #d1d9e6,
                -20px -20px 40px #ffffff,
                inset 1px 1px 2px rgba(255,255,255,0.8),
                inset -1px -1px 2px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.3s ease;
        }
        .btn-3d {
            box-shadow: 6px 6px 12px #c5cbe1, -6px -6px 12px #ffffff;
            transition: all 0.2s ease;
        }
        .btn-3d:active {
            box-shadow: inset 4px 4px 8px #c5cbe1, inset -4px -4px 8px #ffffff;
            transform: translateY(2px);
        }
        .btn-primary-3d {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 20px -10px rgba(118, 75, 162, 0.8);
            border: none;
        }
        .btn-primary-3d:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -10px rgba(118, 75, 162, 0.9); }
        .btn-primary-3d:active { transform: translateY(1px); }
        
        /* Print Styles */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .card-3d { box-shadow: none; border: 1px solid #ccc; }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, PieChart, Pie, Cell } = window.Recharts;

        // URL จาก Google Apps Script (GAS) ที่ฝังไว้
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz6Mqe4fKyye37ux9iLTp74N2i2AMDKQwqnUWh2yi106jWsHMNP2TU1vYw-zDGjNmG_/exec";

        // Icons (SVGs)
        const Icons = {
            Dashboard: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>,
            Inventory: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>,
            Borrow: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>,
            Reports: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>,
            Logout: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>,
            AI: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>,
            Print: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
        };

        const CATEGORIES = ['คอมพิวเตอร์', 'โปรเจคเตอร์', 'ไมโครโฟน', 'ลำโพง', 'กล้อง', 'สายสัญญาณ', 'อุปกรณ์เครือข่าย', 'วัสดุสิ้นเปลือง'];

        // --- Main App Component ---
        const App = () => {
            const [user, setUser] = useState(null); // null, 'admin'
            const [view, setView] = useState('borrow'); // เริ่มที่หน้ายืม-คืน
            const [showLoginModal, setShowLoginModal] = useState(false);
            
            // State สำหรับเก็บข้อมูลที่ดึงจาก GAS
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            // โหลดข้อมูลจาก GAS เมื่อเปิดเว็บ
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(GAS_URL);
                        const result = await response.json();
                        if (result.status === 'success') {
                            setInventory(result.data.inventory || []);
                            setTransactions(result.data.transactions || []);
                        }
                    } catch (error) {
                        console.error('Error fetching data:', error);
                        // หากโหลดไม่สำเร็จ ให้จำลองข้อมูลเพื่อไม่ให้ระบบค้าง
                        alert("ไม่สามารถโหลดข้อมูลจากฐานข้อมูลได้ กรุณาตรวจสอบ URL หรือการเชื่อมต่ออินเทอร์เน็ต");
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchData();
            }, []);
            
            // ฟังก์ชันส่งข้อมูลกลับไปบันทึกที่ GAS
            const syncToGAS = async (action, payload) => {
                try {
                    // ใช้ text/plain เพื่อเลี่ยง CORS Preflight ของ Google Script
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify({ action, payload })
                    });
                    const result = await response.json();
                    console.log('GAS Sync Success:', result);
                } catch (error) {
                    console.error('GAS Sync Error:', error);
                    alert("เกิดข้อผิดพลาดในการบันทึกข้อมูลลงฐานข้อมูล (ตรวจสอบ Console)");
                }
            };

            // Login Handler
            const handleLogin = (username, password) => {
                if (username === 'admin' && password === '1234') {
                    setUser({ username, role: 'admin' });
                    setShowLoginModal(false);
                } else {
                    alert('ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง');
                }
            };

            // หน้าจอโหลดข้อมูล
            if (isLoading) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-gray-50">
                        <div className="loader mb-4"></div>
                        <p className="text-gray-600 font-medium animate-pulse">กำลังโหลดข้อมูลจากฐานข้อมูล...</p>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden bg-gray-50">
                    {showLoginModal && <LoginModal onLogin={handleLogin} onClose={() => setShowLoginModal(false)} />}
                    {/* Sidebar */}
                    <div className="w-64 bg-white/80 backdrop-blur-xl shadow-[10px_0_15px_-3px_rgba(0,0,0,0.1)] z-10 flex flex-col no-print">
                        <div className="p-6 text-center">
                            <div className="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mx-auto shadow-lg flex items-center justify-center text-white font-bold text-2xl mb-3 transform rotate-3">
                                IT
                            </div>
                            <h1 className="font-bold text-gray-800">ระบบจัดการครุภัณฑ์</h1>
                            <p className="text-xs text-gray-500 mt-1">3D Smart System</p>
                        </div>
                        
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            {[
                                { id: 'borrow', icon: <Icons.Borrow />, label: 'ยืม-คืน / เบิก' },
                                { id: 'dashboard', icon: <Icons.Dashboard />, label: 'ภาพรวม (Dashboard)' },
                                { id: 'inventory', icon: <Icons.Inventory />, label: 'คลังวัสดุ/ครุภัณฑ์' },
                                { id: 'reports', icon: <Icons.Reports />, label: 'รายงาน & AI' },
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setView(item.id)}
                                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${
                                        view === item.id 
                                        ? 'bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-md transform scale-105' 
                                        : 'text-gray-600 hover:bg-white hover:shadow-sm'
                                    }`}
                                >
                                    {item.icon}
                                    <span className="font-medium">{item.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="p-4 border-t border-gray-100">
                            {user ? (
                                <>
                                    <div className="bg-gray-50 rounded-xl p-3 mb-3 border border-gray-100 shadow-inner text-sm">
                                        <p className="text-gray-500">ผู้ใช้งาน:</p>
                                        <p className="font-bold text-indigo-600">{user.username}</p>
                                        <p className="text-xs text-gray-400">สิทธิ์: {user.role.toUpperCase()}</p>
                                    </div>
                                    <button 
                                        onClick={() => setUser(null)}
                                        className="w-full flex items-center justify-center space-x-2 text-red-500 hover:bg-red-50 px-4 py-2 rounded-xl transition-colors btn-3d bg-white"
                                    >
                                        <Icons.Logout />
                                        <span>ออกจากระบบ</span>
                                    </button>
                                </>
                            ) : (
                                <button 
                                    onClick={() => setShowLoginModal(true)}
                                    className="w-full flex items-center justify-center space-x-2 text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-xl transition-colors btn-3d bg-white"
                                >
                                    <Icons.Logout />
                                    <span className="font-bold">เข้าสู่ระบบ</span>
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-auto p-4 md:p-8 relative scroll-smooth">
                        {/* Background Decoration */}
                        <div className="absolute top-0 right-0 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10 pointer-events-none"></div>
                        <div className="absolute top-0 right-48 w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10 pointer-events-none"></div>

                        <div className="relative z-10">
                            {view === 'dashboard' && <Dashboard inventory={inventory} />}
                            {view === 'inventory' && <Inventory user={user} inventory={inventory} setInventory={setInventory} syncToGAS={syncToGAS} />}
                            {view === 'borrow' && <BorrowReturn user={user} inventory={inventory} setInventory={setInventory} transactions={transactions} setTransactions={setTransactions} syncToGAS={syncToGAS} />}
                            {view === 'reports' && <Reports inventory={inventory} transactions={transactions} />}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Sub Components ---

        const LoginModal = ({ onLogin, onClose }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            return (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="card-3d p-8 w-full max-w-md relative z-10 text-center bg-white/90">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
                        <div className="w-20 h-20 bg-white rounded-3xl mx-auto shadow-inner flex items-center justify-center mb-6 border border-gray-100">
                            <span className="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-purple-600">
                                AV/IT
                            </span>
                        </div>
                        <h2 className="text-xl font-bold text-gray-800 mb-2">เข้าสู่ระบบ</h2>
                        <p className="text-gray-500 mb-6 text-sm">สำหรับผู้ดูแลระบบ</p>

                        <form onSubmit={(e) => { e.preventDefault(); onLogin(username, password); }} className="space-y-4">
                            <div>
                                <input 
                                    type="text" placeholder="ชื่อผู้ใช้งาน (Username)" 
                                    className="w-full px-5 py-3 rounded-xl bg-gray-50 border-0 shadow-inner focus:ring-2 focus:ring-indigo-400 focus:outline-none transition-all"
                                    value={username} onChange={e => setUsername(e.target.value)} required
                                />
                            </div>
                            <div>
                                <input 
                                    type="password" placeholder="รหัสผ่าน (Password)" 
                                    className="w-full px-5 py-3 rounded-xl bg-gray-50 border-0 shadow-inner focus:ring-2 focus:ring-indigo-400 focus:outline-none transition-all"
                                    value={password} onChange={e => setPassword(e.target.value)}
                                />
                            </div>
                            <button type="submit" className="w-full py-3 rounded-xl btn-primary-3d text-lg font-semibold mt-2">
                                เข้าสู่ระบบ
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ inventory }) => {
            const totalEquipment = inventory.filter(i => i.type === 'equipment').length;
            const lowStock = inventory.filter(i => i.type === 'material' && i.stock <= i.minStock).length;
            const borrowedCount = inventory.filter(i => i.status === 'ยืมอยู่').length;

            const categoryData = CATEGORIES.map(cat => ({
                name: cat,
                จำนวน: inventory.filter(i => i.category === cat).length
            })).filter(d => d.จำนวน > 0);

            const COLORS = ['#6366f1', '#8b5cf6', '#ec4899', '#14b8a6', '#f59e0b', '#3b82f6', '#10b981', '#ef4444'];

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-gray-800">ภาพรวมระบบ (Dashboard)</h2>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="card-3d p-6 border-l-4 border-l-indigo-500">
                            <h3 className="text-gray-500 text-sm font-semibold">ครุภัณฑ์ทั้งหมด</h3>
                            <p className="text-4xl font-black text-indigo-600 mt-2">{totalEquipment} <span className="text-lg text-gray-400">รายการ</span></p>
                        </div>
                        <div className="card-3d p-6 border-l-4 border-l-orange-500">
                            <h3 className="text-gray-500 text-sm font-semibold">วัสดุใกล้หมด</h3>
                            <p className="text-4xl font-black text-orange-600 mt-2">{lowStock} <span className="text-lg text-gray-400">รายการ</span></p>
                        </div>
                        <div className="card-3d p-6 border-l-4 border-l-pink-500">
                            <h3 className="text-gray-500 text-sm font-semibold">รายการถูกยืม</h3>
                            <p className="text-4xl font-black text-pink-600 mt-2">{borrowedCount} <span className="text-lg text-gray-400">รายการ</span></p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="card-3d p-6">
                            <h3 className="text-lg font-bold text-gray-700 mb-4">สัดส่วนตามหมวดหมู่</h3>
                            <div className="flex justify-center" style={{ width: '100%', height: '300px' }}>
                                <PieChart width={400} height={300}>
                                    <Pie data={categoryData} cx="50%" cy="50%" innerRadius={60} outerRadius={100} paddingAngle={5} dataKey="จำนวน" label>
                                        {categoryData.map((entry, index) => <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />)}
                                    </Pie>
                                    <Tooltip />
                                    <Legend />
                                </PieChart>
                            </div>
                        </div>

                        <div className="card-3d p-6">
                            <h3 className="text-lg font-bold text-gray-700 mb-4">จำนวนอุปกรณ์แบ่งตามหมวด</h3>
                             <div className="flex justify-center" style={{ width: '100%', height: '300px' }}>
                                <BarChart width={500} height={300} data={categoryData} margin={{ top: 20, right: 30, left: 20, bottom: 5 }}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0"/>
                                    <XAxis dataKey="name" axisLine={false} tickLine={false} />
                                    <YAxis axisLine={false} tickLine={false} />
                                    <Tooltip cursor={{fill: 'rgba(0,0,0,0.05)'}} borderRadius={10}/>
                                    <Bar dataKey="จำนวน" radius={[6, 6, 0, 0]}>
                                        {categoryData.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                        ))}
                                    </Bar>
                                </BarChart>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Inventory = ({ user, inventory, setInventory, syncToGAS }) => {
            const [search, setSearch] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            
            // Form State (รองรับทุกตัวแปรจากฐานข้อมูล)
            const [formData, setFormData] = useState({
                name: '', category: 'คอมพิวเตอร์', type: 'equipment', brand: '', model: '', 
                location: '', status: 'ว่าง', stock: 1, minStock: 0, image: '', serials: ['']
            });

            const isAdmin = user?.role === 'admin';

            const filtered = inventory.filter(i => 
                (i.name || '').toLowerCase().includes(search.toLowerCase()) || 
                (i.category || '').includes(search) ||
                (i.serials && i.serials.some(s => (s || '').toLowerCase().includes(search.toLowerCase())))
            );

            const handleSave = (e) => {
                e.preventDefault();
                const cleanData = { 
                    ...formData, 
                    serials: formData.serials.filter(s => s.trim() !== '') 
                };
                
                if (editingItem) {
                    const newInv = inventory.map(i => i.id === editingItem.id ? { ...cleanData, id: i.id } : i);
                    setInventory(newInv);
                    syncToGAS('UPDATE_INVENTORY', { ...cleanData, id: editingItem.id });
                } else {
                    const newItem = { ...cleanData, id: Date.now() };
                    setInventory([...inventory, newItem]);
                    syncToGAS('ADD_INVENTORY', newItem);
                }
                setIsModalOpen(false);
            };

            const handleDelete = (id) => {
                if(confirm('ยืนยันการลบรายการนี้?')) {
                    setInventory(inventory.filter(i => i.id !== id));
                    syncToGAS('DELETE_INVENTORY', { id });
                }
            };

            const openAdd = () => {
                setEditingItem(null);
                setFormData({ name: '', category: 'คอมพิวเตอร์', type: 'equipment', brand: '', model: '', location: '', status: 'ว่าง', stock: 1, minStock: 0, image: '', serials: [''] });
                setIsModalOpen(true);
            };

            const openEdit = (item) => {
                setEditingItem(item);
                // ดึงข้อมูลเดิมมาแสดงในฟอร์มให้ครบ
                setFormData({ 
                    ...item, 
                    serials: (item.serials && item.serials.length > 0) ? [...item.serials] : [''] 
                });
                setIsModalOpen(true);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setFormData({ ...formData, image: reader.result });
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <h2 className="text-2xl font-bold text-gray-800">คลังวัสดุและครุภัณฑ์</h2>
                        <div className="flex gap-2 w-full sm:w-auto">
                            <input 
                                type="text" placeholder="ค้นหาชื่อ, เลขครุภัณฑ์..." 
                                className="px-4 py-2 rounded-xl border border-gray-200 shadow-sm focus:ring-2 focus:ring-indigo-400 outline-none flex-1"
                                value={search} onChange={e => setSearch(e.target.value)}
                            />
                            {isAdmin && (
                                <button onClick={openAdd} className="btn-primary-3d px-6 py-2 rounded-xl font-semibold whitespace-nowrap">
                                    + เพิ่มรายการ

                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filtered.map(item => (
                            <div key={item.id} className="card-3d overflow-hidden group flex flex-col">
                                <div className="h-40 bg-gray-100 relative shrink-0">
                                    {item.image ? 
                                        <img src={item.image} alt={item.name} className="w-full h-full object-cover" /> :
                                        <div className="w-full h-full flex items-center justify-center text-gray-400">ไม่มีรูปภาพ</div>

                                    <div className="absolute top-2 right-2 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold shadow">
                                        {item.category}
                                    </div>
                                </div>
                                <div className="p-5 flex-1 flex flex-col">
                                    <h3 className="font-bold text-lg text-gray-800 truncate" title={item.name}>{item.name}</h3>
                                    <p className="text-sm text-gray-500 mb-3">{item.brand} {item.model}</p>
                                    
                                    <div className="flex justify-between items-center text-sm mb-2">
                                        <span className="text-gray-500">ประเภท:</span>
                                        <span className="font-medium">{item.type === 'equipment' ? 'ครุภัณฑ์' : 'วัสดุสิ้นเปลือง'}</span>
                                    </div>
                                    
                                    {item.type === 'equipment' ? (
                                        <div className="flex justify-between items-center text-sm mb-2">
                                            <span className="text-gray-500">สถานะ:</span>
                                            <span className={`px-2 py-1 rounded-md text-xs font-bold 
                                                ${item.status === 'ว่าง' ? 'bg-green-100 text-green-700' : 
                                                  item.status === 'ชำรุด' ? 'bg-red-100 text-red-700' : 
                                                  item.status === 'ส่งซ่อม' ? 'bg-orange-100 text-orange-700' : 'bg-pink-100 text-pink-700'}`}>
                                                {item.status || 'ว่าง'}
                                            </span>
                                        </div>
                                    ) : (
                                        <div className="flex justify-between items-center text-sm mb-2">
                                            <span className="text-gray-500">คงเหลือ:</span>
                                            <span className={`font-bold ${item.stock <= item.minStock ? 'text-red-500' : 'text-green-600'}`}>
                                                {item.stock} ชิ้น
                                            </span>
                                        </div>
                                    )}

                                    <div className="text-xs text-gray-500 mb-2 truncate">
                                        สถานที่: {item.location || '-'}
                                    </div>

                                    {item.type === 'equipment' && item.serials && item.serials.length > 0 && (
                                        <div className="text-xs text-gray-400 mb-4 bg-gray-50 p-2 rounded-lg truncate">
                                            SN: {item.serials.slice(0, 2).join(', ')} {item.serials.length > 2 && '...'}
                                        </div>
                                    )}

                                    <div className="mt-auto">
                                        {isAdmin && (
                                            <div className="flex gap-2 pt-4 border-t border-gray-100">
                                                <button onClick={() => openEdit(item)} className="flex-1 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg text-sm font-medium hover:bg-indigo-100 transition">แก้ไข</button>
                                                <button onClick={() => handleDelete(item.id)} className="flex-1 py-1.5 bg-red-50 text-red-600 rounded-lg text-sm font-medium hover:bg-red-100 transition">ลบ</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                        {filtered.length === 0 && <div className="col-span-full text-center py-10 text-gray-400">ไม่พบรายการที่ค้นหา</div>}
                    </div>

                    {/* Input Form Modal (ครบทุกตัวแปร) */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="card-3d w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md z-10">
                                    <h3 className="text-xl font-bold text-gray-800">{editingItem ? 'แก้ไขข้อมูลอุปกรณ์' : 'เพิ่มรายการใหม่'}</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
                                </div>
                                <form onSubmit={handleSave} className="p-6 space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        {/* Name */}
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อรายการ *</label>
                                            <input type="text" required className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none shadow-inner bg-gray-50" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                        </div>
                                        {/* Category */}
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่</label>
                                            <select className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none shadow-inner bg-gray-50" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        {/* Type */}
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">ประเภทระบบ</label>
                                            <select className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none shadow-inner bg-gray-50" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>
                                                <option value="equipment">ครุภัณฑ์ (มีให้ยืม-คืน)</option>
                                                <option value="material">วัสดุสิ้นเปลือง (เบิกตัดสต็อก)</option>
                                            </select>
                                        </div>
                                        {/* Location */}
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">สถานที่จัดเก็บ</label>
                                            <input type="text" placeholder="เช่น ตู้ A, ห้องเก็บของ" className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none shadow-inner bg-gray-50" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} />
                                        </div>
                                        {/* Brand */}
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">ยี่ห้อ (Brand)</label>
                                            <input type="text" className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none shadow-inner bg-gray-50" value={formData.brand} onChange={e => setFormData({...formData, brand: e.target.value})} />
                                        </div>
                                        {/* Model */}
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">รุ่น (Model)</label>
                                            <input type="text" className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none shadow-inner bg-gray-50" value={formData.model} onChange={e => setFormData({...formData, model: e.target.value})} />
                                        </div>
                                    </div>

                                    {/* เงื่อนไขฟอร์ม: หากเป็นครุภัณฑ์ให้กรอก Serial / สถานะ, หากเป็นวัสดุให้กรอก สต็อก */}
                                    {formData.type === 'equipment' ? (
                                        <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 space-y-4">
                                            {/* Status - เพิ่มตัวเลือกสถานะได้ครบถ้วน */}
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-1">สถานะปัจจุบัน (Status)</label>
                                                <select className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none bg-white" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}>
                                                    <option value="ว่าง">ว่าง (พร้อมใช้งาน/ยืม)</option>
                                                    <option value="ยืมอยู่" disabled={!editingItem}>ยืมอยู่</option>
                                                    <option value="ชำรุด">ชำรุด</option>
                                                    <option value="ส่งซ่อม">ส่งซ่อม</option>
                                                    <option value="สูญหาย">สูญหาย</option>
                                                </select>
                                            </div>

                                            {/* Serials */}
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2">หมายเลขครุภัณฑ์ (Serial Numbers)</label>
                                                {formData.serials.map((serial, index) => (
                                                    <div key={index} className="flex gap-2 mb-2">
                                                        <input 
                                                            type="text" placeholder="กรอกเลข SN..." className="flex-1 px-3 py-2 border rounded-lg outline-none bg-white"
                                                            value={serial} 
                                                            onChange={e => {
                                                                const newS = [...formData.serials];
                                                                newS[index] = e.target.value;
                                                                setFormData({...formData, serials: newS});
                                                            }} 
                                                        />
                                                        <button type="button" onClick={() => setFormData({...formData, serials: formData.serials.filter((_, i) => i !== index)})} className="px-3 text-red-500 hover:bg-red-50 rounded-lg border border-transparent hover:border-red-200 transition">ลบ</button>
                                                    </div>
                                                ))}
                                                <button type="button" onClick={() => setFormData({...formData, serials: [...formData.serials, '']})} className="text-sm text-indigo-600 font-bold bg-white px-3 py-1.5 rounded border border-indigo-200 hover:bg-indigo-100">+ เพิ่มหมายเลข</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-4 bg-orange-50 p-4 rounded-xl border border-orange-100">
                                            {/* Stock */}
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-1">จำนวนคงเหลือ (Stock)</label>
                                                <input type="number" min="0" className="w-full px-3 py-2 border rounded-lg outline-none bg-white" value={formData.stock} onChange={e => setFormData({...formData, stock: parseInt(e.target.value) || 0})} />
                                            </div>
                                            {/* Min Stock */}
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-1">จุดแจ้งเตือน (Min Stock)</label>
                                                <input type="number" min="0" className="w-full px-3 py-2 border rounded-lg outline-none bg-white" value={formData.minStock} onChange={e => setFormData({...formData, minStock: parseInt(e.target.value) || 0})} />
                                            </div>
                                        </div>
                                    )}

                                    {/* Image Base64 */}
                                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                                        <label className="block text-sm font-medium text-gray-700 mb-2">อัปโหลดรูปภาพ (Image)</label>
                                        <input type="file" accept="image/*" onChange={handleImageUpload} className="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition cursor-pointer" />
                                        {formData.image && <img src={formData.image} alt="Preview" className="mt-3 h-24 rounded-lg object-cover shadow border" />}
                                    </div>

                                    <div className="pt-2 flex gap-3 justify-end border-t border-gray-100 mt-6">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="px-6 py-2.5 rounded-xl bg-gray-200 text-gray-700 font-medium hover:bg-gray-300 transition">ยกเลิก</button>
                                        <button type="submit" className="px-6 py-2.5 rounded-xl btn-primary-3d font-medium">บันทึกข้อมูลเข้าระบบ</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

       const BorrowReturn = ({ user, inventory, setInventory, transactions, setTransactions, syncToGAS }) => {
            const [mode, setMode] = useState('borrow');
            const [selectedCategory, setSelectedCategory] = useState('');
            const [selectedItem, setSelectedItem] = useState('');
            const [borrower, setBorrower] = useState('');
            const [qty, setQty] = useState(1);

            const handleAction = (e) => {
                e.preventDefault();
                
                // แยก ID และ Serial Number ออกจากกัน (เฉพาะเวลาที่ยืมครุภัณฑ์)
                let targetId = selectedItem;
                let selectedSn = '';
                if (mode === 'borrow') {
                    const parts = selectedItem.split(':::');
                    targetId = parts[0];
                    selectedSn = parts[1] || '';
                }

                const item = inventory.find(i => i.id === parseInt(targetId));
                if(!item) return alert('กรุณาเลือกรายการ');

                if(mode === 'borrow') {
                    if(item.status !== 'ว่าง') return alert('อุปกรณ์ไม่พร้อมยืม');
                    setInventory(inventory.map(i => i.id === item.id ? {...i, status: 'ยืมอยู่'} : i));
                    
                    // บันทึกชื่ออุปกรณ์ + SN เฉพาะตัวที่เลือกลงใน Log
                    const displayItemName = selectedSn ? `${item.name} (SN: ${selectedSn})` : item.name;
                    const log = { id: Date.now(), type: 'ยืม', itemId: item.id, itemName: displayItemName, user: borrower, date: new Date().toLocaleString(), status: 'รอคืน' };
                    
                    setTransactions([...transactions, log]);
                    syncToGAS('LOG_TRANSACTION', log);
                    alert('บันทึกการยืมสำเร็จ');
                } else if (mode === 'material') {
                    if(item.stock < qty) return alert('สต็อกวัสดุไม่เพียงพอ');
                    setInventory(inventory.map(i => i.id === item.id ? {...i, stock: i.stock - qty} : i));
                    const log = { id: Date.now(), type: 'เบิก', itemId: item.id, itemName: item.name, user: borrower, qty, date: new Date().toLocaleString(), status: 'เบิกแล้ว' };
                    setTransactions([...transactions, log]);
                    syncToGAS('LOG_TRANSACTION', log);
                    alert('บันทึกการเบิกสำเร็จ');
                }
                setSelectedItem(''); setBorrower(''); setQty(1);
            };

            const handleReturn = (txId, itemId) => {
                const receiverName = window.prompt('ระบุชื่อผู้รับคืน:', user?.username || '');
                if (receiverName === null) return; 
                
                setInventory(inventory.map(i => i.id === itemId ? {...i, status: 'ว่าง'} : i));
                setTransactions(transactions.map(t => t.id === txId ? {...t, status: 'คืนแล้ว', returnDate: new Date().toLocaleString(), receiver: receiverName} : t));
                syncToGAS('LOG_RETURN', { txId, itemId, receiver: receiverName });
                alert('บันทึกการคืนสำเร็จ');
            };

            const equipAvailable = inventory.filter(i => i.type === 'equipment' && i.status === 'ว่าง' && (selectedCategory === '' || i.category === selectedCategory));
            const materials = inventory.filter(i => i.type === 'material');
            const activeBorrows = transactions.filter(t => t.type === 'ยืม' && t.status === 'รอคืน');

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-gray-800">ระบบยืม-คืน / เบิกวัสดุ</h2>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="card-3d p-6">
                            <div className="flex bg-gray-100 p-1 rounded-xl mb-6">
                                <button className={`flex-1 py-2 rounded-lg font-medium text-sm transition-all ${mode === 'borrow' ? 'bg-white shadow text-indigo-600' : 'text-gray-500 hover:bg-gray-200'}`} onClick={() => {setMode('borrow'); setSelectedItem('');}}>ยืมครุภัณฑ์</button>
                                <button className={`flex-1 py-2 rounded-lg font-medium text-sm transition-all ${mode === 'material' ? 'bg-white shadow text-indigo-600' : 'text-gray-500 hover:bg-gray-200'}`} onClick={() => {setMode('material'); setSelectedItem('');}}>เบิกวัสดุสิ้นเปลือง</button>
                            </div>

                            <form onSubmit={handleAction} className="space-y-4">
                                {mode === 'borrow' && (
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">กรองตามหมวดหมู่</label>
                                        <select className="w-full px-4 py-3 rounded-xl border border-gray-200 shadow-inner focus:ring-2 focus:ring-indigo-400 outline-none mb-2" value={selectedCategory} onChange={e => { setSelectedCategory(e.target.value); setSelectedItem(''); }}>
                                            <option value="">-- แสดงทุกหมวดหมู่ --</option>
                                            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                )}
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">เลือกรายการที่ต้องการ</label>
                                    <select required className="w-full px-4 py-3 rounded-xl border border-gray-200 shadow-inner focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50" value={selectedItem} onChange={e => setSelectedItem(e.target.value)}>
                                        <option value="">-- กรุณาเลือก --</option>
                                        {mode === 'borrow' ? 
                                            equipAvailable.flatMap(i => {
                                                // แตกรายการตามจำนวน Serial Number
                                                if (i.serials && i.serials.length > 0) {
                                                    return i.serials.map((sn, index) => (
                                                        <option key={`${i.id}-${index}`} value={`${i.id}:::${sn}`}>
                                                            {i.name} (SN: {sn})
                                                        </option>
                                                    ));
                                                }
                                                return (
                                                    <option key={i.id} value={`${i.id}:::`}>
                                                        {i.name} (ไม่มี SN)
                                                    </option>
                                                );
                                            }) :
                                            materials.map(i => <option key={i.id} value={i.id}>{i.name} (คงเหลือ {i.stock})</option>)
                                        }
                                    </select>
                                </div>
                                {mode === 'material' && (
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">จำนวนที่ต้องการเบิก</label>
                                        <input type="number" min="1" required className="w-full px-4 py-3 rounded-xl border border-gray-200 shadow-inner focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50" value={qty} onChange={e => setQty(parseInt(e.target.value))} />
                                    </div>
                                )}
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ยืม / ผู้เบิก</label>
                                    <input type="text" required className="w-full px-4 py-3 rounded-xl border border-gray-200 shadow-inner focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50" value={borrower} onChange={e => setBorrower(e.target.value)} placeholder="ระบุชื่อ-นามสกุล..." />
                                </div>
                                <button type="submit" className="w-full py-3.5 rounded-xl btn-primary-3d font-bold mt-2 text-lg">
                                    {mode === 'borrow' ? 'บันทึกการยืม' : 'บันทึกการเบิก'}
                                </button>
                            </form>
                        </div>

                        <div className="card-3d p-6">
                            <h3 className="font-bold text-lg text-gray-800 mb-4 border-b pb-2">รายการอุปกรณ์ที่ยังไม่ส่งคืน ({activeBorrows.length})</h3>
                            <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                                {activeBorrows.length === 0 ? <p className="text-gray-400 text-sm text-center py-10 bg-gray-50 rounded-xl">ไม่มีรายการค้างคืน</p> : null}
                                {activeBorrows.map(tx => (
                                    <div key={tx.id} className="bg-white border border-gray-200 p-4 rounded-xl flex justify-between items-center hover:shadow-md transition">
                                        <div>
                                            <p className="font-bold text-gray-800">{tx.itemName}</p>
                                            <p className="text-xs text-gray-500 mt-1">ผู้ยืม: <span className="font-medium text-gray-700">{tx.user}</span> | {tx.date}</p>
                                        </div>
                                        {user?.role === 'admin' ? (
                                            <button onClick={() => handleReturn(tx.id, tx.itemId)} className="px-4 py-2 bg-green-100 text-green-700 rounded-lg text-sm font-bold hover:bg-green-200 btn-3d shrink-0 ml-2 border border-green-200">
                                                รับคืน
                                            </button>
                                        ) : (
                                            <span className="text-xs font-medium text-orange-500 bg-orange-50 px-2 py-1 rounded shrink-0 ml-2 border border-orange-100">รอคืน</span>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="card-3d p-0 overflow-hidden mt-6">
                        <div className="p-6 border-b border-gray-100 bg-white/80">
                            <h3 className="font-bold text-lg text-gray-800">ประวัติการทำรายการล่าสุด (Log)</h3>
                        </div>
                        <div className="overflow-x-auto max-h-[400px]">
                            <table className="w-full text-sm text-left">
                                <thead className="text-xs text-gray-600 bg-gray-50 uppercase sticky top-0">
                                    <tr>
                                        <th className="px-6 py-3">วันที่เวลา</th>
                                        <th className="px-6 py-3">ประเภท</th>
                                        <th className="px-6 py-3">รายการ</th>
                                        <th className="px-6 py-3">ผู้ทำรายการ</th>
                                        <th className="px-6 py-3">สถานะ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {transactions.length === 0 ? <tr><td colSpan="5" className="text-center py-8 text-gray-400">ยังไม่มีประวัติการทำรายการ</td></tr> : null}
                                    {[...transactions].reverse().map(tx => (
                                        <tr key={tx.id} className="bg-white border-b hover:bg-gray-50">
                                            <td className="px-6 py-4 whitespace-nowrap text-gray-500">{tx.date}</td>
                                            <td className="px-6 py-4">
                                                <span className={`px-2 py-1 rounded text-xs font-bold ${tx.type === 'ยืม' ? 'bg-indigo-100 text-indigo-700' : 'bg-pink-100 text-pink-700'}`}>
                                                    {tx.type}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4 font-medium text-gray-800">
                                                {tx.itemName} {tx.qty && <span className="text-gray-500 text-xs">({tx.qty} ชิ้น)</span>}
                                            </td>
                                            <td className="px-6 py-4 text-gray-600">{tx.user}</td>
                                            <td className="px-6 py-4">
                                                {tx.status === 'รอคืน' ? <span className="text-orange-500 font-bold text-xs bg-orange-50 px-2 py-1 rounded">รอคืน</span> : 
                                                 tx.status === 'คืนแล้ว' ? <span className="text-green-600 font-bold text-xs bg-green-50 px-2 py-1 rounded">คืนแล้ว</span> : 
                                                 <span className="text-gray-500 font-bold text-xs bg-gray-100 px-2 py-1 rounded">เสร็จสิ้น</span>}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };
        const Reports = ({ inventory, transactions }) => {
            const [aiSummary, setAiSummary] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);

            const generateAISummary = () => {
                setIsGenerating(true);
                setTimeout(() => {
                    const lowStock = inventory.filter(i => i.type === 'material' && i.stock <= i.minStock);
                    const borrows = transactions.filter(t => t.status === 'รอคืน').length;
                    const topCategory = CATEGORIES.map(c => ({name: c, count: inventory.filter(i=>i.category===c).length})).sort((a,b)=>b.count-a.count)[0];
                    
                    let summary = `จากการวิเคราะห์ข้อมูลระบบ ณ ปัจจุบัน: \n\n`;
                    if(topCategory && topCategory.count > 0) {
                        summary += `📦 หมวดหมู่ที่มีอุปกรณ์มากที่สุดคือ "${topCategory.name}" มีจำนวน ${topCategory.count} รายการ\n`;
                    }
                    if (borrows > 0) summary += `⚠️ มีอุปกรณ์ที่ถูกยืมและยังไม่ส่งคืนจำนวน ${borrows} รายการ ควรติดตามทวงถาม\n`;
                    else summary += `✅ ไม่มีรายการค้างคืนในระบบ\n`;
                    
                    if (lowStock.length > 0) {
                        summary += `🚨 แจ้งเตือนวัสดุใกล้หมดสต็อก ได้แก่: ${lowStock.map(i => i.name).join(', ')} กรุณาดำเนินการสั่งซื้อเพิ่มเติม`;
                    } else {
                        summary += `✅ วัสดุสิ้นเปลืองทุกรายการมีจำนวนเพียงพอในสต็อก`;
                    }
                    setAiSummary(summary);
                    setIsGenerating(false);
                }, 1500);
            };

            const exportToExcel = () => {
                const ws = XLSX.utils.json_to_sheet(inventory.map(i => ({
                    'ID': i.id, 'ชื่อรายการ': i.name, 'หมวดหมู่': i.category, 'ประเภท': i.type === 'equipment' ? 'ครุภัณฑ์' : 'วัสดุ',
                    'ยี่ห้อ': i.brand, 'รุ่น': i.model, 'สถานที่จัดเก็บ': i.location, 'Serial': (i.serials || []).join(','),
                    'สถานะ/คงเหลือ': i.type === 'equipment' ? i.status : i.stock
                })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Inventory");
                XLSX.writeFile(wb, "Inventory_Report.xlsx");
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center no-print">
                        <h2 className="text-2xl font-bold text-gray-800">รายงานและการวิเคราะห์ (AI)</h2>
                        <div className="flex gap-2">
                            <button onClick={() => window.print()} className="flex items-center gap-2 px-4 py-2 bg-gray-800 text-white rounded-xl shadow hover:bg-gray-700 transition">
                                <Icons.Print /> พิมพ์ (Print)
                            </button>
                            <button onClick={exportToExcel} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-xl shadow hover:bg-green-500 transition">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Export Excel
                            </button>
                        </div>
                    </div>

                    <div className="card-3d p-6 bg-gradient-to-r from-indigo-50 to-purple-50 border border-indigo-100">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-bold text-indigo-800 flex items-center gap-2">
                                <Icons.AI /> AI Smart Summary
                            </h3>
                            <button onClick={generateAISummary} disabled={isGenerating} className="btn-primary-3d px-4 py-1.5 rounded-lg text-sm font-medium disabled:opacity-50 flex items-center gap-2">
                                {isGenerating ? 'กำลังวิเคราะห์...' : '✨ สร้างบทสรุปอัตโนมัติ'}
                            </button>
                        </div>
                        {aiSummary ? (
                            <div className="p-4 bg-white rounded-xl shadow-sm border border-indigo-50 whitespace-pre-line text-gray-700 leading-relaxed font-medium">
                                {aiSummary}
                            </div>
                        ) : (
                            <div className="text-center py-6 text-gray-400 text-sm">
                                คลิกปุ่มด้านบนเพื่อให้ AI วิเคราะห์ข้อมูลคงคลังและรายการค้างคืนให้คุณ
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
